name: Deploy Frontend to AWS App Runner

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build, push to ECR and deploy to App Runner
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPO_NAME: ${{ secrets.ECR_REPO_NAME }}
      APP_RUNNER_SERVICE_NAME: ${{ secrets.APP_RUNNER_SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO_NAME" || aws ecr create-repository --repository-name "$ECR_REPO_NAME"

      - name: Build Docker image
        run: |
          IMAGE_TAG=latest
          aws_account_id=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com
          docker build -t $ECR_REPO_NAME:$IMAGE_TAG ./frontend
          docker tag $ECR_REPO_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG

      - name: Push image to ECR
        run: |
          aws_account_id=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=latest
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker push ${ECR_REGISTRY}/${ECR_REPO_NAME}:$IMAGE_TAG

      - name: Deploy (create or update App Runner service)
        run: |
          aws_account_id=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY=${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPO_NAME}:latest

          # Check if service exists
          SERVICE_ARN=$(aws apprunner list-services --region ${AWS_REGION} --query "ServiceSummaryList[?ServiceName=='${APP_RUNNER_SERVICE_NAME}'].ServiceArn | [0]" --output text)

          if [ "$SERVICE_ARN" = "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "Creating App Runner service ${APP_RUNNER_SERVICE_NAME} using image ${IMAGE_URI}"
            aws apprunner create-service --service-name ${APP_RUNNER_SERVICE_NAME} \
              --source-configuration ImageRepository='{ImageIdentifier="'${IMAGE_URI}'",ImageRepositoryType="ECR"}' \
              --instance-configuration Cpu="1024",Memory="2048" \
              --region ${AWS_REGION}
          else
            echo "Updating App Runner service ${APP_RUNNER_SERVICE_NAME} to image ${IMAGE_URI}"
            aws apprunner update-service --service-arn ${SERVICE_ARN} --source-configuration ImageRepository='{ImageIdentifier="'${IMAGE_URI}'",ImageRepositoryType="ECR"}' --region ${AWS_REGION}
          fi
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPO_NAME: ${{ secrets.ECR_REPO_NAME }}
          APP_RUNNER_SERVICE_NAME: ${{ secrets.APP_RUNNER_SERVICE_NAME }}
